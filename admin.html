<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Abhinav Portfolio</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #090d16;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.09);
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.25);
      --secondary: #06b6d4;
      --accent: #f472b6;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --success: #22c55e;
      --error: #ef4444;
      --font-main: 'Inter', sans-serif;
      --font-head: 'Outfit', sans-serif;
      --font-mono: 'Space Grotesk', monospace;
      --radius: 16px;
      --transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 10%, rgba(99, 102, 241, 0.12) 0%, transparent 65%),
        radial-gradient(ellipse 50% 45% at 90% 90%, rgba(6, 182, 212, 0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===================== LOGIN PAGE ===================== */
    #login-page {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: var(--radius);
      padding: 48px 40px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.04);
      animation: fadeUp 0.5s ease-out both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-8px);
      }

      40% {
        transform: translateX(8px);
      }

      60% {
        transform: translateX(-6px);
      }

      80% {
        transform: translateX(6px);
      }
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .login-logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .login-logo-icon svg {
      width: 22px;
      height: 22px;
      stroke: white;
      fill: none;
    }

    .login-logo-text h1 {
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .login-logo-text p {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .login-heading {
      font-family: var(--font-head);
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--text) 40%, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-subtext {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .login-field {
      margin-bottom: 20px;
    }

    .login-field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .login-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .login-input-wrap svg {
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      stroke: var(--text-muted);
      fill: none;
      pointer-events: none;
    }

    .login-input-wrap input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px 13px 42px;
      color: var(--text);
      font-family: var(--font-main);
      font-size: 0.95rem;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .login-input-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .login-error {
      display: none;
      color: var(--error);
      font-size: 0.83rem;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .login-error.show {
      opacity: 1;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--primary), #818cf8);
      color: white;
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.35);
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.45);
    }

    .login-btn svg {
      width: 18px;
      height: 18px;
      stroke: white;
      fill: none;
    }

    .back-home {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color var(--transition);
    }

    .back-home:hover {
      color: var(--primary);
    }

    .back-home svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
    }

    /* ===================== ADMIN DASHBOARD ===================== */
    #admin-page {
      display: none;
      width: 100%;
      max-width: 900px;
      position: relative;
      z-index: 1;
    }

    #admin-page.visible {
      display: block;
      animation: fadeUp 0.5s ease-out both;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
    }

    .admin-header-left h2 {
      font-family: var(--font-head);
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text) 40%, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .admin-header-left p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .admin-header-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .admin-btn {
      padding: 9px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(12px);
      color: var(--text);
      font-family: var(--font-main);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: all var(--transition);
    }

    .admin-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .admin-btn.danger:hover {
      border-color: var(--error);
      color: var(--error);
    }

    .admin-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
    }

    .admin-btn-logout {
      padding: 9px 18px;
    }

    .message-count {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .message-count span {
      color: var(--primary);
      font-weight: 700;
    }

    .messages-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message-card {
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      border-radius: var(--radius);
      padding: 24px;
      transition: border-color var(--transition), transform var(--transition);
      animation: fadeUp 0.4s ease-out both;
    }

    .message-card:hover {
      border-color: rgba(99, 102, 241, 0.3);
      transform: translateY(-2px);
    }

    .message-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .sender-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 1rem;
      color: white;
      flex-shrink: 0;
    }

    .sender-details {
      flex: 1;
    }

    .sender-details h4 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .sender-details a {
      font-size: 0.83rem;
      color: var(--primary);
      text-decoration: none;
    }

    .sender-details a:hover {
      text-decoration: underline;
    }

    .message-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .message-date {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .msg-delete-btn {
      border: 1px solid rgba(239, 68, 68, 0.25);
      background: rgba(239, 68, 68, 0.07);
      border-radius: 6px;
      color: #ef4444;
      padding: 5px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      transition: all 0.2s;
    }

    .msg-delete-btn:hover {
      background: rgba(239, 68, 68, 0.18);
    }

    .msg-delete-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
    }

    .message-subject {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .message-body {
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .message-actions {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .reply-btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid rgba(99, 102, 241, 0.4);
      background: rgba(99, 102, 241, 0.08);
      color: var(--primary);
      font-size: 0.85rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: all 0.2s;
    }

    .reply-btn:hover {
      background: rgba(99, 102, 241, 0.18);
    }

    .reply-btn svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .empty-state svg {
      width: 56px;
      height: 56px;
      stroke: var(--text-muted);
      fill: none;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-family: var(--font-head);
      font-size: 1.2rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <!-- ==================== LOGIN PAGE ==================== -->
  <div id="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <div class="login-logo-text">
          <h1>Abhinav Admin</h1>
          <p>Private access only</p>
        </div>
      </div>

      <h2 class="login-heading">Welcome back.</h2>
      <p class="login-subtext">Enter your admin password to access contact messages.</p>

      <form id="login-form">
        <div class="login-field">
          <label for="admin-password">Admin Password</label>
          <div class="login-input-wrap">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="admin-password" placeholder="Enter your password"
              autocomplete="current-password">
          </div>
          <p class="login-error" id="login-error">
            <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            Incorrect password. Please try again.
          </p>
        </div>

        <button type="submit" class="login-btn">
          <svg viewBox="0 0 24 24">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <polyline points="10 17 15 12 10 7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
          </svg>
          Sign In to Admin
        </button>
      </form>

      <a href="/" class="back-home">
        <svg viewBox="0 0 24 24">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Portfolio
      </a>
    </div>
  </div>

  <!-- ==================== ADMIN DASHBOARD ==================== -->
  <div id="admin-page">
    <div class="admin-header">
      <div class="admin-header-left">
        <h2>📬 Contact Messages</h2>
        <p>Messages received via the portfolio contact form.</p>
      </div>
      <div class="admin-header-right">
        <span class="message-count">Total: <span id="total-count">0</span></span>
        <button class="admin-btn danger" id="clear-all-btn">
          <svg viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
          </svg>
          Clear All
        </button>
        <button class="admin-btn admin-btn-logout" id="logout-btn">
          <svg viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Log Out
        </button>
        <a href="/" class="admin-btn">
          <svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          Home
        </a>
      </div>
    </div>

    <div class="messages-container" id="messages-container">
      <!-- Dynamically populated by admin.js -->
    </div>
  </div>

  <script src="admin.js"></script>
  <script>lucide.createIcons();</script>
</body>

</html>
